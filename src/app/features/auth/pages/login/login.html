<div class="login-container">
  <mat-card>
    <h2>Login</h2>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput [(ngModel)]="email" placeholder="Email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput [(ngModel)]="password" type="password" />
    </mat-form-field>

    <button mat-raised-button color="primary" class="full-width" (click)="onLogin()">
      Login
    </button>
  </mat-card>
</div>
